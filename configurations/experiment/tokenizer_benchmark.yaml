defaults:
  - base_experiment

tasks: [training]

training:
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 64
  num_train_epochs: 10
  learning_rate: 5.0e-4
  warmup_steps: 100
  weight_decay: 0.01
  mlm_probability: 0.15
  fp16: false
  bf16: false
  dataloader_num_workers: 4
  save_steps: 1000
  eval_strategy: "steps"
  eval_steps: 500
  logging_steps: 50
  save_total_limit: 3
  seed: 42
