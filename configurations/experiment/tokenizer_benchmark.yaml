defaults:
  - base_experiment

tasks: [training]

training:
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 64
  num_train_epochs: 20
  learning_rate: 5.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  mlm_probability: 0.15
  fp16: false
  bf16: false
  dataloader_num_workers: 8
  eval_strategy: "epoch"
  logging_steps: 100
  save_strategy: "no"
  save_total_limit: 1
  seed: 42
