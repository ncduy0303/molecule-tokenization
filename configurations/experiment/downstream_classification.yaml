defaults:
  - base_experiment

tasks: [training]

training:
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 64
  num_train_epochs: 5
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  dataloader_num_workers: 8
  logging_steps: 100
  early_stopping_patience: 3
  seed: 42
